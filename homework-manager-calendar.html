<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>作业管理小帮手 · 日历版</title>
  <style>
    :root {
      --bg1: #fff3f8;
      --bg2: #eef7ff;
      --card: #ffffffcc;
      --cardSolid: #ffffff;
      --text: #2b2b2b;
      --muted: #6b6b6b;
      --primary: #ff6ea8;
      --primary2: #7c5cff;
      --good: #2ecc71;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --border: rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: radial-gradient(1200px 700px at 10% 0%, var(--bg1), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, var(--bg2), transparent 55%),
                  linear-gradient(180deg, #ffffff 0%, #f6fbff 100%);
      min-height: 100vh;
      padding: 18px 14px 28px;
    }

    /* 左右布局 */
    .app-layout {
      display: flex;
      gap: 20px;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* 左侧日历栏 */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 16px 12px;
      height: fit-content;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .calendar-header button {
      background: rgba(0,0,0,0.05);
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
    }
    .calendar-header button:hover {
      background: rgba(0,0,0,0.1);
    }
    .calendar-header .year-month {
      font-weight: 800;
      font-size: 1rem;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      background: transparent;
      transition: 0.1s;
      user-select: none;
    }
    .day:hover {
      background: rgba(124,92,255,0.15);
    }
    .day.selected {
      background: var(--primary2);
      color: white;
      box-shadow: 0 2px 8px rgba(124,92,255,0.4);
    }
    .day.other-month {
      color: #aaa;
    }
    .day.has-task {
      position: relative;
      font-weight: 800;
    }
    .day.has-task::after {
      content: "•";
      position: absolute;
      bottom: 2px;
      font-size: 12px;
      color: var(--primary);
    }

    /* 右侧主区域 */
    .main {
      flex: 1;
      min-width: 0;
    }

    /* 视图切换按钮 */
    .view-switch {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .view-btn {
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 18px;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.1s;
    }
    .view-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 12px rgba(255,110,168,0.3);
    }

    /* 添加作业视图（原四板块） */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      margin-top: 14px;
    }
    .panel {
      grid-column: span 6;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 14px;
      overflow: hidden;
    }
    @media (max-width: 820px) {
      .panel { grid-column: span 12; }
    }
    .panelHeader {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .panelName {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .panelEmoji { font-size: 22px; }
    .panelTitle {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
    }
    .panelMeta {
      margin: 0;
      font-size: 12.5px;
      color: var(--muted);
    }
    .formRow {
      display: flex;
      gap: 10px;
      margin: 10px 0 12px;
      align-items: center;
    }
    .input {
      flex: 1;
      border: 1px solid rgba(0,0,0,.10);
      background: rgba(255,255,255,.75);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    .input:focus {
      border-color: rgba(124,92,255,.45);
      box-shadow: 0 0 0 4px rgba(124,92,255,.14);
    }
    .btn {
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 900;
      font-size: 14px;
      transition: transform .06s ease;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .btnPrimary {
      color: white;
      background: linear-gradient(180deg, var(--primary), #ff4e95);
      box-shadow: 0 10px 20px rgba(255,110,168,.25);
    }
    .btnFinish {
      color: white;
      background: linear-gradient(180deg, #40c4ff, #1fa1ff);
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 900;
      cursor: pointer;
    }
    .btnFinish:disabled { opacity: 0.55; cursor: not-allowed; }

    .btnDelete{
      color: #b00020;
      background: rgba(255, 105, 135, .16);
      border: 1px solid rgba(176, 0, 32, .18);
      border-radius: 12px;
      padding: 7px 10px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }
    .btnDelete:hover{ filter: brightness(1.02); }

    .taskActions{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-end;
    }
    .list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .task {
      display: flex;
      gap: 10px;
      align-items: center;
      border: 1px dashed rgba(0,0,0,.10);
      background: rgba(255,255,255,.72);
      border-radius: 16px;
      padding: 10px;
    }
    .taskText {
      flex: 1;
      font-size: 14px;
      font-weight: 800;
      word-break: break-word;
    }
    .taskDone {
      border-style: solid;
      background: rgba(46, 204, 113, .10);
    }
    .doneLabel {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 10px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 13px;
      color: #127a3b;
      background: rgba(46, 204, 113, .20);
      white-space: nowrap;
    }
    .empty {
      border: 1px dashed rgba(0,0,0,.12);
      background: rgba(255,255,255,.55);
      border-radius: 16px;
      padding: 14px 12px;
      color: var(--muted);
      font-size: 13.5px;
      font-weight: 700;
    }

    /* 查看数据视图 */
    .stats-view {
      background: var(--card);
      backdrop-filter: blur(6px);
      border-radius: 28px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .stats-card {
      margin-bottom: 28px;
    }
    .stats-title {
      font-size: 1.25rem;
      font-weight: 900;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats-bar-outer {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: #00000010;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.06);
      margin: 8px 0 6px;
    }
    .stats-bar-inner {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--primary2));
      transition: width .3s;
    }
    .stats-meta {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    .footerTip {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 12.5px;
    }
    .smallBtn {
      border: 1px solid rgba(0,0,0,.10);
      background: rgba(255,255,255,.7);
      padding: 8px 10px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 900;
      color: #333;
    }
    .smallBtn:hover { filter: brightness(1.02); }

    .notesBox{
      margin-top: 14px;
      border-radius: 22px;
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(0,0,0,.08);
      padding: 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,.05);
      backdrop-filter: blur(6px);
    }
    .notesTitle{
      font-weight: 950;
      font-size: 14px;
      color: #3b3b3b;
      margin-bottom: 8px;
    }
    .notesTextArea{
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.10);
      background: rgba(255,255,255,.8);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      resize: vertical;
      line-height: 1.4;
    }
    .notesTextArea:focus{
      border-color: rgba(124,92,255,.45);
      box-shadow: 0 0 0 4px rgba(124,92,255,.14);
    }
    .notesMeta{
      margin-top: 8px;
      color: var(--muted);
      font-size: 12.2px;
      font-weight: 700;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <!-- 左侧日历栏 -->
  <div class="sidebar">
    <div class="calendar-header">
      <button id="prevMonthBtn">←</button>
      <span class="year-month" id="yearMonthDisplay">2025年3月</span>
      <button id="nextMonthBtn">→</button>
    </div>
    <div class="weekdays">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div id="calendarDays" class="calendar-days"></div>
    <div class="footerTip" style="margin-top: 16px;">📅 点击日期选中，添加作业将绑定该日期</div>
    <div class="notesBox" aria-label="备忘与反馈记录">
      <div class="notesTitle">📝 备忘 / 反馈</div>
      <textarea
        id="notesText"
        class="notesTextArea"
        rows="6"
        placeholder="在这里随意输入反馈意见（会自动保存）"
      ></textarea>
      <div class="notesMeta">会自动保存到 localStorage</div>
    </div>
  </div>

  <!-- 右侧主区域 -->
  <div class="main">
    <div class="view-switch">
      <button id="viewAddBtn" class="view-btn active">➕ 添加作业</button>
      <button id="viewStatsBtn" class="view-btn">📊 查看数据</button>
    </div>

    <!-- 添加作业视图（默认显示） -->
    <div id="addView">
      <div class="progressCard" style="margin-bottom: 20px; background: var(--card); backdrop-filter: blur(6px); border-radius: 28px; padding: 14px 18px; border: 1px solid var(--border); box-shadow: var(--shadow);">
        <div class="progressTop" style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:8px;">
          <div class="progressLabel" style="font-weight:800;">总进度条 <span>🍀</span></div>
          <div class="progressPct" id="progressText">0%</div>
        </div>
        <div class="barOuter" style="width:100%; height:16px; border-radius:999px; background:#00000010; overflow:hidden; border:1px solid rgba(0,0,0,.06);">
          <div class="barInner" id="progressBar" style="height:100%; width:0%; border-radius:999px; background: linear-gradient(90deg, var(--primary), var(--primary2)); transition: width .3s;"></div>
        </div>
        <div class="footerTip" id="progressDetail" style="margin-top:10px;">已完成 0 / 总数 0</div>
      </div>
      <div class="grid" id="panels">
        <!-- 四个板块动态生成，结构同上 -->
      </div>
    </div>

    <!-- 查看数据视图（隐藏） -->
    <div id="statsView" style="display: none;">
      <div class="stats-view">
        <div class="stats-card">
          <div class="stats-title">📅 选中日期作业 <span id="todayDateSpan"></span></div>
          <div class="stats-bar-outer"><div class="stats-bar-inner" id="todayBar"></div></div>
          <div class="stats-meta" id="todayDetail"></div>
        </div>
        <div class="stats-card">
          <div class="stats-title">📆 选中日期所在周作业（周一 ~ 周日）</div>
          <div class="stats-bar-outer"><div class="stats-bar-inner" id="weekBar"></div></div>
          <div class="stats-meta" id="weekDetail"></div>
        </div>
        <div class="stats-card" style="margin-bottom:0;">
          <div class="stats-title">📅 本周每天完成率</div>
          <div class="stats-meta" id="weekDaysList" style="line-height:1.7;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (() => {
    const STORAGE_KEY = "homework_calendar_v2";
    // 数据结构: { tasks: [{ id, date, category, text, completed }] }
    let tasks = [];

    // 日历相关
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth(); // 0-11
    // 关键修复：使用“本地时区”生成 YYYY-MM-DD，避免 toISOString() 导致日期偏移（如差一天）
    let selectedDate = null; // 在下面初始化

    // DOM 元素
    const panelsContainer = document.getElementById('panels');
    const addView = document.getElementById('addView');
    const statsView = document.getElementById('statsView');
    const viewAddBtn = document.getElementById('viewAddBtn');
    const viewStatsBtn = document.getElementById('viewStatsBtn');
    const NOTES_KEY = "homework_calendar_notes_v1";
    const notesTextArea = document.getElementById('notesText');
    let notesSaveTimer = null;

    // 辅助函数
    function pad2(n) { return String(n).padStart(2, "0"); }
    function formatDateLocal(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }
    function getTodayStr() { return formatDateLocal(new Date()); }

    // 初始化选中日期（按本地时区）
    selectedDate = getTodayStr();

    // 保存 / 加载
    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function saveNotes() {
      if (!notesTextArea) return;
      try {
        localStorage.setItem(NOTES_KEY, String(notesTextArea.value || ""));
      } catch (e) {
        console.warn("备忘保存失败：", e);
      }
    }

    function loadNotes() {
      if (!notesTextArea) return;
      const raw = localStorage.getItem(NOTES_KEY);
      notesTextArea.value = raw ? String(raw) : "";
    }

    function scheduleSaveNotes() {
      if (!notesTextArea) return;
      if (notesSaveTimer) clearTimeout(notesSaveTimer);
      notesSaveTimer = setTimeout(saveNotes, 250);
    }
    function loadTasks() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) tasks = parsed;
          else tasks = [];
        } catch(e) { tasks = []; }
      } else {
        tasks = [];
      }
      // 保证每个任务都有 date/categoy 字段（兼容旧数据）
      tasks = tasks
        .filter(t => t && typeof t === 'object')
        .map(t => ({
          id: String(t.id || (Date.now() + '_' + Math.random())),
          date: String(t.date || getTodayStr()),
          category: String(t.category || 'other'),
          text: String(t.text || '').trim(),
          completed: t.completed === true
        }))
        .filter(t => t.text.length > 0);
    }

    // 获取所有任务
    function getAllTasks() { return tasks; }

    // 进度计算（全部任务）
    function getTotalProgress() {
      const total = tasks.length;
      const done = tasks.filter(t => t.completed).length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      return { total, done, pct };
    }

    // 今日任务统计
    function getDayStats(dateStr) {
      const dayTasks = tasks.filter(t => t.date === dateStr);
      const total = dayTasks.length;
      const done = dayTasks.filter(t => t.completed).length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      return { total, done, pct };
    }

    // 本周任务统计（周一~周日）
    function parseYMD(dateStr) {
      const parts = String(dateStr).split("-").map(Number);
      // dateStr: YYYY-MM-DD
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function getWeekStats(dateStr) {
      const base = parseYMD(dateStr);
      const dayOfWeek = base.getDay(); // 0周日 1周一...

      const start = new Date(base);
      const end = new Date(base);

      if (dayOfWeek === 0) { // 周日：本周从往前6天的周一开始
        start.setDate(base.getDate() - 6);
      } else {
        start.setDate(base.getDate() - (dayOfWeek - 1));
      }

      end.setDate(start.getDate() + 6);
      start.setHours(0,0,0,0);
      end.setHours(23,59,59,999);

      const weekTasks = tasks.filter(t => {
        const taskDate = parseYMD(t.date);
        return taskDate >= start && taskDate <= end;
      });

      const total = weekTasks.length;
      const done = weekTasks.filter(t => t.completed).length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      return { total, done, pct, start: formatDateLocal(start), end: formatDateLocal(end), startDateObj: start };
    }

    // 渲染总进度条
    function renderTotalProgress() {
      const { total, done, pct } = getTotalProgress();
      document.getElementById('progressText').innerText = pct + '%';
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressDetail').innerText = `已完成 ${done} / 总数 ${total}`;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // 渲染分类面板（添加作业视图）
    function renderPanels() {
      const categories = [
        { key: 'chinese', name: '语文', emoji: '📘', placeholder: '语文作业' },
        { key: 'math', name: '数学', emoji: '🧮', placeholder: '数学作业' },
        { key: 'english', name: '英语', emoji: '📗', placeholder: '英语作业' },
        { key: 'other', name: '其他', emoji: '🎒', placeholder: '其他作业' }
      ];
      panelsContainer.innerHTML = '';
      for (const cat of categories) {
        // 右侧四个面板：只显示“选中日期”的作业
        const catTasks = tasks.filter(t => t.category === cat.key && t.date === selectedDate);
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.category = cat.key;
        panel.innerHTML = `
          <div class="panelHeader">
            <div class="panelName">
              <div class="panelEmoji">${cat.emoji}</div>
              <h2 class="panelTitle">${cat.name}</h2>
              <p class="panelMeta">作业项</p>
            </div>
            <div class="panelMeta" data-count>${catTasks.length} 项</div>
          </div>
          <div class="formRow">
            <input class="input" type="text" placeholder="输入${cat.name}作业名称" data-input />
            <button class="btn btnPrimary" type="button" data-add>添加作业</button>
          </div>
          <ul class="list" data-list></ul>
        `;

        const listEl = panel.querySelector('[data-list]');
        if (catTasks.length === 0) {
          listEl.innerHTML = '<li class="empty">还没有作业，快添加一个吧！</li>';
        } else {
          listEl.innerHTML = catTasks.map(task => `
            <li class="task ${task.completed ? 'taskDone' : ''}">
              <div class="taskText">${escapeHtml(task.text)} <span style="font-size:11px; color:#999;">📅 ${escapeHtml(task.date)}</span></div>
              ${!task.completed ? `<button class="btnFinish" data-action="finish" data-id="${task.id}" data-category="${cat.key}">完成</button>` : `
                <div class="taskActions">
                  <div class="doneLabel">已完成</div>
                  <button class="btnDelete" type="button" data-action="delete" data-id="${task.id}">删除</button>
                </div>
              `}
            </li>
          `).join('');
        }

        panelsContainer.appendChild(panel);
      }

      // 事件：添加（只绑定到新生成的按钮/输入）
      panelsContainer.querySelectorAll('[data-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          const panel = btn.closest('.panel');
          const category = panel.dataset.category;
          const input = panel.querySelector('[data-input]');
          const text = input.value.trim();
          if (!text) return;
          addTask(category, text);
          input.value = '';
          input.focus();
        });
      });

      panelsContainer.querySelectorAll('[data-input]').forEach(input => {
        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            const panel = input.closest('.panel');
            const category = panel.dataset.category;
            const text = input.value.trim();
            if (!text) return;
            addTask(category, text);
            input.value = '';
          }
        });
      });
    }

    function addTask(category, text) {
      tasks.push({
        id: Date.now() + '_' + Math.random(),
        date: selectedDate,
        category: category,
        text: text,
        completed: false
      });
      saveTasks();
      renderAll();
    }

    // 外层统一处理按钮点击，避免 renderPanels() 多次执行导致重复绑定
    panelsContainer.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      const action = btn.dataset.action;
      const id = btn.dataset.id;
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      if (action === 'finish') {
        if (task.completed) return;
        task.completed = true;
        saveTasks();
        renderAll();
        return;
      }

      if (action === 'delete') {
        if (!task.completed) return; // 只允许在“已完成”后删除（符合你的需求）
        const ok = confirm("确定删除这条作业吗？");
        if (!ok) return;
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderAll();
        return;
      }
    });

    // 渲染统计视图
    function renderStats() {
      const selected = selectedDate;
      const day = getDayStats(selected);
      const week = getWeekStats(selected);

      document.getElementById('todayDateSpan').innerText = selected;

      const todayBar = document.getElementById('todayBar');
      const todayDetail = document.getElementById('todayDetail');
      todayBar.style.width = day.pct + '%';
      todayDetail.innerText = `已完成 ${day.done} / ${day.total} 项 (${day.pct}%)`;

      const weekBar = document.getElementById('weekBar');
      const weekDetail = document.getElementById('weekDetail');
      weekBar.style.width = week.pct + '%';
      weekDetail.innerText = `已完成 ${week.done} / ${week.total} 项 (${week.pct}%)  (${week.start} ~ ${week.end})`;

      // 本周每天完成率细分（按周一~周日）
      const weekDaysList = document.getElementById('weekDaysList');
      const weekdayCn = ["周日","周一","周二","周三","周四","周五","周六"];
      const parts = [];
      for (let i = 0; i < 7; i++) {
        const dObj = new Date(week.startDateObj);
        dObj.setDate(dObj.getDate() + i);
        const dStr = formatDateLocal(dObj);
        const s = getDayStats(dStr);
        const label = weekdayCn[dObj.getDay()];
        parts.push(`${label}：${s.pct}%（${s.done}/${s.total}）`);
      }
      weekDaysList.textContent = parts.join("  |  ");
    }

    // 渲染总计/面板/日历（根据当前视图）
    function renderAll() {
      if (addView.style.display !== 'none') {
        renderPanels();
        renderTotalProgress();
      } else {
        renderStats();
      }
      renderCalendar(); // 更新日历上的小圆点标记
    }

    // 日历渲染
    function renderCalendar() {
      const firstDayOfMonth = new Date(currentYear, currentMonth, 1);
      const startWeekday = firstDayOfMonth.getDay(); // 0周日, 我们需要周一为一周开始
      let offset = startWeekday === 0 ? 6 : startWeekday - 1; // 转换成周一索引0-6
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();
      const days = [];

      // 上月补充
      for (let i = offset; i > 0; i--) {
        const dayNum = prevMonthDays - i + 1;
        days.push({ year: currentYear, month: currentMonth - 1, day: dayNum, isCurrent: false });
      }
      // 本月
      for (let i = 1; i <= daysInMonth; i++) {
        days.push({ year: currentYear, month: currentMonth, day: i, isCurrent: true });
      }
      // 下月补齐到6行
      const remaining = 42 - days.length;
      for (let i = 1; i <= remaining; i++) {
        days.push({ year: currentYear, month: currentMonth + 1, day: i, isCurrent: false });
      }

      const container = document.getElementById('calendarDays');
      container.innerHTML = '';
      for (const d of days) {
        const dateObj = new Date(d.year, d.month, d.day);
        const dateStr = formatDateLocal(dateObj);
        const isSelected = (dateStr === selectedDate);
        const hasTask = tasks.some(t => t.date === dateStr);

        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        if (!d.isCurrent) dayDiv.classList.add('other-month');
        if (isSelected) dayDiv.classList.add('selected');
        if (hasTask) dayDiv.classList.add('has-task');
        dayDiv.textContent = d.day;

        dayDiv.addEventListener('click', () => {
          selectedDate = dateStr;
          renderCalendar();
          // 选中日期变化后：同步刷新右侧面板/统计视图
          if (addView.style.display !== 'none') {
            renderPanels();
            renderTotalProgress();
          } else {
            renderStats();
          }
        });
        container.appendChild(dayDiv);
      }

      document.getElementById('yearMonthDisplay').innerText = `${currentYear}年${currentMonth+1}月`;
    }

    // 切换视图
    function setView(view) {
      if (view === 'add') {
        addView.style.display = 'block';
        statsView.style.display = 'none';
        viewAddBtn.classList.add('active');
        viewStatsBtn.classList.remove('active');
        renderPanels();
        renderTotalProgress();
      } else {
        addView.style.display = 'none';
        statsView.style.display = 'block';
        viewAddBtn.classList.remove('active');
        viewStatsBtn.classList.add('active');
        renderStats();
      }
    }

    // 初始化
    loadTasks();
    loadNotes();
    renderCalendar();
    setView('add'); // 默认添加视图

    // 视图切换按钮
    viewAddBtn.addEventListener('click', () => setView('add'));
    viewStatsBtn.addEventListener('click', () => setView('stats'));

    // 备忘：输入自动保存
    if (notesTextArea) {
      notesTextArea.addEventListener('input', scheduleSaveNotes);
    }

    document.getElementById('prevMonthBtn').addEventListener('click', () => {
      if (currentMonth === 0) {
        currentMonth = 11;
        currentYear--;
      } else {
        currentMonth--;
      }
      renderCalendar();
    });
    document.getElementById('nextMonthBtn').addEventListener('click', () => {
      if (currentMonth === 11) {
        currentMonth = 0;
        currentYear++;
      } else {
        currentMonth++;
      }
      renderCalendar();
    });
  })();
</script>
</body>
</html>
